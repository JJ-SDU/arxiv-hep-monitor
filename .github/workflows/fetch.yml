name: Fetch arXiv hep-th & hep-ex (JJ-SDU)

on:
  schedule:
    - cron: '10 1 * * 1-5'   # 北京时间 上午 9:10
    - cron: '0 2 * * 1-5'    # 北京时间 上午 10:00
    - cron: '0 6 * * 1-5'    # 北京时间 下午 2:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser

      - name: Run fetch script
        run: |
          python fetch.py
          if [ -f "output/data.json" ]; then
            echo "✅ data.json 文件生成成功！"
          else
            echo "❌ 错误：output/data.json 文件未生成！"
            exit 1
          fi

      # 直接用现成的 Action 提交推送，自动处理冲突
      - name: Commit and push data.json
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.ref_name }}
          directory: ./output
          files: data.json
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "Auto-update data [skip ci] - $(date +'%Y-%m-%d %H:%M:%S')"
