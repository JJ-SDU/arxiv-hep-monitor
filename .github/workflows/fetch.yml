name: Fetch arXiv hep-th & hep-ex (JJ-SDU)

on:
  schedule:
    - cron: '10 1 * * 1-5'   # 北京时间 上午 9:10
    - cron: '0 2 * * 1-5'    # 北京时间 上午 10:00
    - cron: '0 6 * * 1-5'    # 北京时间 下午 2:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser

      - name: Run fetch script
        run: |
          echo "当前工作目录：$(pwd)"
          echo "运行前文件状态："
          ls -la output/
          python fetch.py
          echo "运行后文件状态："
          ls -la output/
          cat output/data.json | head -20  # 打印文件开头，确认内容

      # 强制提交（不管有没有变更，都会覆盖）
      - name: Commit and push data.json
        uses: ad-m/github-push-action@master
        with:
          branch: ${{ github.ref_name }}
          directory: ./
          files: output/data.json
          github_token: ${{ secrets.GITHUB_TOKEN }}
          message: "Auto-update data [skip ci] - $(date +'%Y-%m-%d %H:%M:%S')"
          force: true  # 关键：强制推送，即使 Git 认为无变更
