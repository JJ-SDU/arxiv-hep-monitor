name: Fetch arXiv hep-th & hep-ex (JJ-SDU)

on:
  schedule:
    - cron: '10 1 * * 1-5'   # 北京时间 上午 9:10
    - cron: '0 2 * * 1-5'    # 北京时间 上午 10:00
    - cron: '0 6 * * 1-5'    # 北京时间 下午 2:00
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install feedparser requests

      - name: Run fetch script
        run: |
          echo "=== 脚本运行前状态 ==="
          ls -la output/
          python fetch.py
          echo "=== 脚本运行后状态 ==="
          ls -la output/
          cat output/data.json | head -20

      # 用官方推荐的 add-and-commit Action，稳定可靠
      - name: Commit and push data.json
        uses: EndBug/add-and-commit@v9
        with:
          author_name: github-actions[bot]
          author_email: github-actions[bot]@users.noreply.github.com
          message: "Auto-update data [skip ci] - $(date +'%Y-%m-%d %H:%M:%S')"
          add: "output/data.json"  # 只提交这个文件
          push: true
