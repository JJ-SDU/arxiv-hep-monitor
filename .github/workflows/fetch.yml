name: Fetch arXiv hep-th & hep-ex (JJ-SDU)

# 定时规则：UTC 01:00=北京09:00, UTC 02:00=北京10:00, UTC 06:00=北京14:00，周一到周五执行
on:
  schedule:
    - cron: '0 1 * * 1-5'   # 北京时间 上午 9:00
    - cron: '0 2 * * 1-5'   # 北京时间 上午 10:00
    - cron: '0 6 * * 1-5'   # 北京时间 下午 2:00
  # 支持手动触发（测试用）
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions-setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install feedparser

      - name: Run fetch script
        run: python fetch.py

      # 🔥 修复核心：自动提交并上传 data.json 到仓库
      - name: Commit and push data.json
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add output/data.json
          git commit -m "Auto-update data [skip ci]" || echo "No changes to commit"
          git push
